<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UV FORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg:#080808; --panel:#101010; --hover:#1c1c1c;
  --border:#242424; --borderB:#333;
  --accent:#00e5ff; --accentD:#00b8cc; --accentG:rgba(0,229,255,.12);
  --txt:#e0e0e0; --txt2:#777; --txt3:#444;
  --ok:#39ff6e; --warn:#ffb800; --err:#ff3b3b;
  --mono:'Space Mono',monospace; --ui:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#app{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--ui)}
button{font-family:var(--ui);cursor:pointer;border:none;outline:none;transition:opacity .12s}
button:hover{opacity:.82} button:active{opacity:.65}
input[type=range]{accent-color:var(--accent);cursor:pointer;width:100%}
input[type=color]{cursor:pointer;border:none;background:none;padding:0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--borderB);border-radius:2px}

#app{display:flex;flex-direction:column}

/* TOOLBAR */
#toolbar{
  height:48px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;
}
#logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.2em;margin-right:14px;display:flex;align-items:center;gap:5px}
#logo em{opacity:.35;font-style:normal;font-size:9px}
.sep{width:1px;height:22px;background:var(--border);margin:0 3px;flex-shrink:0}
.tbtn{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;border-radius:2px;
  background:var(--hover);color:var(--txt2);border:1px solid var(--border);white-space:nowrap
}
.tbtn.a{background:var(--accentG);color:var(--accent);border-color:var(--accentD)}
.tbtn.d{background:rgba(255,59,59,.08);color:var(--err);border-color:rgba(255,59,59,.25)}
.tbtn:disabled{opacity:.35;cursor:not-allowed}
#statusbar{display:flex;align-items:center;gap:7px;margin-left:auto;padding:0 10px;min-width:0}
#sdot{width:6px;height:6px;border-radius:50%;background:var(--txt3);flex-shrink:0;transition:all .3s}
#stxt{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#vp-area{flex:1;position:relative;overflow:hidden;min-width:0}

/* Views */
.view{position:absolute;inset:0;display:none;overflow:hidden}
.view.on{display:flex}

/* 3D */
#v3d{position:relative}
#canvas3d{position:absolute;inset:0;width:100%;height:100%;display:block}
#no-mesh{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none}
#no-mesh .ico{font-size:28px;opacity:.12}
#no-mesh .lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.12em}

/* UV */
#vuv{flex-direction:column}
#uvtb{height:36px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 12px;flex-shrink:0}
#uvtb .lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.12em;margin-right:2px}
.uvbtn{padding:3px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;background:var(--hover);color:var(--txt2);border:1px solid var(--border);border-radius:2px}
.uvbtn.a{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}
#uvzoom{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-left:auto}
#uvarea{flex:1;overflow:hidden;position:relative;cursor:crosshair;min-height:0}
#uvstage{position:absolute;transform-origin:0 0;width:1024px;height:1024px}
#uvstage canvas{position:absolute;top:0;left:0;width:1024px;height:1024px}
#no-uv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.12em;pointer-events:none}

/* SPLIT */
#vsplit{gap:0}
#split-3d{flex:1;position:relative;overflow:hidden;border-right:1px solid var(--border)}
#split-uv{flex:1;display:flex;flex-direction:column;overflow:hidden}
#split-uvarea{flex:1;overflow:hidden;position:relative;cursor:crosshair;min-height:0}
#split-uvstage{position:absolute;transform-origin:0 0;width:1024px;height:1024px}
#split-uvstage canvas{position:absolute;top:0;left:0;width:1024px;height:1024px}
#split-no-uv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.12em;pointer-events:none}

/* INSPECTOR */
#insp{width:210px;height:100%;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sec{border-bottom:1px solid var(--border);padding:10px 12px}
.stitle{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;margin-bottom:10px}
.irow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ilbl{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.ival{font-family:var(--mono);font-size:10px;color:var(--txt2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.ival.ok{color:var(--ok)}
.flbl{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.08em;margin-bottom:6px;display:block}
.mrow{display:flex;gap:6px;margin-bottom:12px}
.mbtn{flex:1;padding:5px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;background:var(--bg);color:var(--txt3);border:1px solid var(--border);border-radius:2px}
.mbtn.on{background:var(--accentG);color:var(--accent);border-color:var(--accent)}
#crow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
#cpick{width:34px;height:26px;border:1px solid var(--border);border-radius:2px}
#chex{flex:1;background:var(--bg);border:1px solid var(--border);padding:4px 7px;font-size:10px;font-family:var(--mono);color:var(--txt2);border-radius:2px}
.palette{display:flex;flex-wrap:wrap;gap:4px}
.sw{width:23px;height:23px;border-radius:2px;cursor:pointer;border:1px solid var(--border)}
.sw.on{border:2px solid var(--accent)}
#ifoot{margin-top:auto;padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
#fdot{width:6px;height:6px;border-radius:50%;background:var(--txt3);flex-shrink:0;transition:all .3s}
#ftxt{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.06em}

/* DROP */
#drop-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:7px 18px;pointer-events:none}
#drop-hint span{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em}
#drop-ov{position:fixed;inset:0;background:rgba(0,229,255,.04);border:2px solid var(--accent);display:none;z-index:100;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:.2em}
#drop-ov.on{display:flex}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:8px;height:8px;border:1.5px solid var(--warn);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div id="logo"><em>◈</em> UV FORGE</div>
    <div class="sep"></div>
    <input type="file" id="finput" accept=".obj,.glb" style="display:none"/>
    <button class="tbtn" onclick="document.getElementById('finput').click()">⬡ LOAD MESH</button>
    <button class="tbtn a" id="btn-unwrap" disabled onclick="doUnwrap()">⊞ AUTO UNWRAP</button>
    <div class="sep"></div>
    <button class="tbtn a" id="bv3"  onclick="setView('3d')">3D</button>
    <button class="tbtn"   id="bvuv" onclick="setView('uv')">UV</button>
    <button class="tbtn"   id="bvsp" onclick="setView('split')">SPLIT</button>
    <div id="statusbar">
      <div id="sdot"></div>
      <div id="stxt">Drop a mesh to begin</div>
    </div>
    <div class="sep"></div>
    <button class="tbtn d" id="btn-reset" style="display:none" onclick="resetAll()">✕ RESET</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="vp-area">

      <!-- 3D VIEW -->
      <div class="view on" id="v3d">
        <canvas id="canvas3d"></canvas>
        <div id="no-mesh">
          <div class="ico">⬡</div>
          <div class="lbl">NO MESH LOADED</div>
        </div>
      </div>

      <!-- UV VIEW -->
      <div class="view" id="vuv">
        <div id="uvtb">
          <span class="lbl">UV</span>
          <button class="uvbtn" onclick="uvFill()">FILL</button>
          <button class="uvbtn" onclick="uvClear()">CLEAR</button>
          <span id="uvzoom">ZOOM 100%</span>
          <button class="uvbtn a" onclick="uvExport()">EXPORT PNG</button>
        </div>
        <div id="uvarea">
          <div id="uvstage">
            <canvas id="cc"></canvas>
            <canvas id="pc"></canvas>
            <canvas id="wc"></canvas>
          </div>
          <div id="no-uv">NO UV DATA</div>
        </div>
      </div>

      <!-- SPLIT VIEW -->
      <div class="view" id="vsplit">
        <div id="split-3d"></div>
        <div id="split-uv">
          <div style="height:36px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 12px;flex-shrink:0">
            <span style="font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.12em;margin-right:2px">UV</span>
            <button class="uvbtn" onclick="uvFill()">FILL</button>
            <button class="uvbtn" onclick="uvClear()">CLEAR</button>
            <span id="uvzoom-s" style="font-family:var(--mono);font-size:10px;color:var(--txt3);margin-left:auto">ZOOM 100%</span>
            <button class="uvbtn a" onclick="uvExport()">EXPORT PNG</button>
          </div>
          <div id="split-uvarea">
            <div id="split-uvstage">
              <canvas id="cc-s"></canvas>
              <canvas id="pc-s"></canvas>
              <canvas id="wc-s"></canvas>
            </div>
            <div id="split-no-uv">NO UV DATA</div>
          </div>
        </div>
      </div>

    </div>

    <!-- INSPECTOR -->
    <div id="insp">
      <div class="sec">
        <div class="stitle">MESH</div>
        <div class="irow"><span class="ilbl">FILE</span><span class="ival" id="i-file">—</span></div>
        <div class="irow"><span class="ilbl">VERTS</span><span class="ival" id="i-verts">—</span></div>
        <div class="irow"><span class="ilbl">TRIS</span><span class="ival" id="i-tris">—</span></div>
        <div class="irow"><span class="ilbl">UVS</span><span class="ival" id="i-uvs">NONE</span></div>
      </div>
      <div class="sec">
        <div class="stitle">BRUSH</div>
        <div class="mrow">
          <button class="mbtn on" id="m-paint" onclick="setMode('paint')">PAINT</button>
          <button class="mbtn"    id="m-erase" onclick="setMode('erase')">ERASE</button>
        </div>
        <span class="flbl">COLOR</span>
        <div id="crow">
          <input type="color" id="cpick" value="#ffffff" oninput="setColor(this.value)"/>
          <div id="chex">#FFFFFF</div>
        </div>
        <span class="flbl">BRUSH SIZE — <b id="bval" style="color:var(--accent)">20</b>px</span>
        <input type="range" id="bsize" min="1" max="120" value="20" oninput="S.brush=+this.value;document.getElementById('bval').textContent=this.value"/>
      </div>
      <div class="sec">
        <div class="stitle">PALETTE</div>
        <div class="palette" id="pal"></div>
      </div>
      <div id="ifoot">
        <div id="fdot"></div>
        <div id="ftxt">NO UVS</div>
      </div>
    </div>
  </div>
</div>

<div id="drop-hint"><span>DROP OBJ / GLB  ·  OR CLICK LOAD MESH</span></div>
<div id="drop-ov">DROP MESH HERE</div>

<script>
const S = { mesh:null, name:null, uvs:false, color:'#ffffff', brush:20, mode:'paint', view:'3d' }
const UV = 1024
const $ = id => document.getElementById(id)

// ─── THREE.JS ─────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: $('canvas3d'), antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setClearColor(0x0d0d0d)

const scene = new THREE.Scene()
scene.add(new THREE.GridHelper(10, 20, 0x1a1a1a, 0x141414))
scene.add(new THREE.AmbientLight(0xffffff, 0.45))
const kl = new THREE.DirectionalLight(0xffffff, 1.6); kl.position.set(3,5,4); scene.add(kl)
const fl = new THREE.DirectionalLight(0x8899ff, 0.4); fl.position.set(-4,2,-3); scene.add(fl)
const rl = new THREE.DirectionalLight(0x00e5ff, 0.25); rl.position.set(0,-2,-5); scene.add(rl)

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000)
camera.position.set(0, 2, 5)

// ─── INLINE ORBIT ────────────────────────────────────────────────────
const OC = (() => {
  const el = $('v3d')
  let dn=false, px=0, py=0, theta=0.4, phi=1.1, r=5
  const tgt = new THREE.Vector3()
  let rdn=false, rx=0, ry=0
  el.addEventListener('mousedown', e => {
    if(e.button===0){dn=true;px=e.clientX;py=e.clientY}
    if(e.button===2){rdn=true;rx=e.clientX;ry=e.clientY}
  })
  window.addEventListener('mouseup', () => {dn=false;rdn=false})
  window.addEventListener('mousemove', e => {
    if(dn){
      theta -= (e.clientX-px)*0.005
      phi = Math.max(0.05, Math.min(Math.PI-0.05, phi-(e.clientY-py)*0.005))
      px=e.clientX; py=e.clientY
    }
    if(rdn){
      tgt.x -= (e.clientX-rx)*0.004*r
      tgt.y += (e.clientY-ry)*0.004*r
      rx=e.clientX; ry=e.clientY
    }
  })
  el.addEventListener('wheel', e=>{ r=Math.max(0.5,Math.min(50,r+e.deltaY*0.01)) },{passive:true})
  el.addEventListener('contextmenu', e=>e.preventDefault())
  return {
    update(){
      camera.position.x = tgt.x + r*Math.sin(phi)*Math.sin(theta)
      camera.position.y = tgt.y + r*Math.cos(phi)
      camera.position.z = tgt.z + r*Math.sin(phi)*Math.cos(theta)
      camera.lookAt(tgt)
    },
    reset(d=3.5){ r=d; theta=0.4; phi=1.1; tgt.set(0,0,0) }
  }
})()

// Secondary renderer for split view (avoids moving canvas)
let rSplit = null
function getSplitRenderer(){
  if(!rSplit){
    rSplit = new THREE.WebGLRenderer({ antialias: true })
    rSplit.setPixelRatio(devicePixelRatio)
    rSplit.setClearColor(0x0d0d0d)
    rSplit.domElement.style.cssText='position:absolute;inset:0;width:100%;height:100%'
    $('split-3d').appendChild(rSplit.domElement)
  }
  return rSplit
}

let meshObj = null, mat = null

function resizeAll(){
  const v = $('v3d'), w=v.clientWidth, h=v.clientHeight
  if(w>0&&h>0){ renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix() }
  if(S.view==='split'&&rSplit){
    const sp=$('split-3d'), ws=sp.clientWidth, hs=sp.clientHeight
    if(ws>0&&hs>0) rSplit.setSize(ws,hs,false)
  }
}

function animate(){
  requestAnimationFrame(animate)
  OC.update()
  resizeAll()
  renderer.render(scene, camera)
  if(S.view==='split'&&rSplit) rSplit.render(scene, camera)
}
animate()

// ─── FILE LOADING ─────────────────────────────────────────────────────
$('finput').addEventListener('change', async e => {
  const f=e.target.files?.[0]; e.target.value=''
  if(f) await loadFile(f)
})

async function loadFile(file){
  const ext=file.name.split('.').pop().toLowerCase()
  if(!['obj','glb','gltf'].includes(ext)){ setStatus('Unsupported: .'+ext,'err'); return }
  setStatus('Loading '+file.name+'...','load')
  try{
    const geo = await parseFile(file, ext)
    setGeo(geo, file.name)
    setStatus('Loaded: '+file.name,'ok')
  }catch(e){ setStatus('Error: '+e.message,'err') }
}

function parseFile(file, ext){
  return new Promise((res,rej)=>{
    const rd=new FileReader()
    if(ext==='obj'){
      rd.onload=e=>{try{res(parseOBJ(e.target.result))}catch(e){rej(e)}}
      rd.onerror=()=>rej(new Error('Read failed'))
      rd.readAsText(file)
    }else{
      rd.onload=e=>{try{res(parseGLB(e.target.result))}catch(e){rej(e)}}
      rd.onerror=()=>rej(new Error('Read failed'))
      rd.readAsArrayBuffer(file)
    }
  })
}

function parseOBJ(txt){
  const vp=[],vt=[],vn=[],pi=[],ti=[],ni=[]
  for(const line of txt.split('\n')){
    const p=line.trim().split(/\s+/)
    if(p[0]==='v')  vp.push(+p[1],+p[2],+p[3])
    if(p[0]==='vt') vt.push(+p[1],+p[2])
    if(p[0]==='vn') vn.push(+p[1],+p[2],+p[3])
    if(p[0]==='f'){
      const vs=p.slice(1).map(s=>s.split('/').map(x=>+x-1))
      for(let i=1;i<vs.length-1;i++)
        for(const v of [vs[0],vs[i],vs[i+1]]){ pi.push(v[0]); ti.push(v[1]??-1); ni.push(v[2]??-1) }
    }
  }
  const n=pi.length
  const pos=new Float32Array(n*3)
  const uv=vt.length?new Float32Array(n*2):null
  const norm=vn.length?new Float32Array(n*3):null
  for(let i=0;i<n;i++){
    const p=pi[i]; pos[i*3]=vp[p*3]; pos[i*3+1]=vp[p*3+1]; pos[i*3+2]=vp[p*3+2]
    if(uv&&ti[i]>=0){ uv[i*2]=vt[ti[i]*2]; uv[i*2+1]=vt[ti[i]*2+1] }
    if(norm&&ni[i]>=0){ norm[i*3]=vn[ni[i]*3]; norm[i*3+1]=vn[ni[i]*3+1]; norm[i*3+2]=vn[ni[i]*3+2] }
  }
  const geo=new THREE.BufferGeometry()
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  if(uv)   geo.setAttribute('uv',new THREE.BufferAttribute(uv,2))
  if(norm) geo.setAttribute('normal',new THREE.BufferAttribute(norm,3))
  else geo.computeVertexNormals()
  return geo
}

function parseGLB(buf){
  const dv=new DataView(buf)
  if(dv.getUint32(0,true)!==0x46546C67) throw new Error('Invalid GLB')
  const jlen=dv.getUint32(12,true)
  const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(buf,20,jlen)))
  const bin=buf.slice(20+jlen+8)
  function acc(idx){
    const a=gltf.accessors[idx],bv=gltf.bufferViews[a.bufferView]
    const off=(bv.byteOffset||0)+(a.byteOffset||0)
    const nc={SCALAR:1,VEC2:2,VEC3:3,VEC4:4}[a.type]
    const T=a.componentType===5126?Float32Array:a.componentType===5123?Uint16Array:Uint32Array
    return new T(bin,off,a.count*nc)
  }
  const prim=gltf.meshes[0].primitives[0]
  const geo=new THREE.BufferGeometry()
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(acc(prim.attributes.POSITION)),3))
  if(prim.attributes.NORMAL!=null)    geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(acc(prim.attributes.NORMAL)),3))
  if(prim.attributes.TEXCOORD_0!=null) geo.setAttribute('uv',new THREE.BufferAttribute(new Float32Array(acc(prim.attributes.TEXCOORD_0)),2))
  if(prim.indices!=null) geo.setIndex(new THREE.BufferAttribute(new Uint32Array(acc(prim.indices)),1))
  if(!prim.attributes.NORMAL) geo.computeVertexNormals()
  return geo
}

function setGeo(geo, name){
  geo.computeBoundingBox()
  const c=new THREE.Vector3(); geo.boundingBox.getCenter(c); geo.translate(-c.x,-c.y,-c.z)
  const sz=new THREE.Vector3(); geo.boundingBox.getSize(sz)
  const m=Math.max(sz.x,sz.y,sz.z); if(m>0){const f=2/m;geo.scale(f,f,f)}
  if(meshObj){ scene.remove(meshObj); meshObj.geometry.dispose(); meshObj.material.dispose() }
  mat=new THREE.MeshStandardMaterial({color:0xcccccc,roughness:.65,metalness:.08,side:THREE.DoubleSide})
  meshObj=new THREE.Mesh(geo,mat); scene.add(meshObj)
  S.mesh=geo; S.name=name; S.uvs=!!geo.attributes.uv
  OC.reset()
  $('no-mesh').style.display='none'
  $('drop-hint').style.display='none'
  $('btn-unwrap').disabled=false
  $('btn-reset').style.display=''
  $('i-file').textContent=name
  $('i-verts').textContent=geo.attributes.position.count.toLocaleString()
  $('i-tris').textContent=Math.round((geo.index?geo.index.count:geo.attributes.position.count)/3).toLocaleString()
  refreshUVInfo(); drawWire(); drawChecker()
}

// ─── UV UNWRAP ────────────────────────────────────────────────────────
function doUnwrap(){
  if(!S.mesh) return
  setStatus('Generating UVs...','load')
  $('btn-unwrap').disabled=true
  setTimeout(()=>{
    try{
      const geo=S.mesh,pos=geo.attributes.position,n=pos.count
      geo.computeBoundingBox()
      const c=new THREE.Vector3(); geo.boundingBox.getCenter(c)
      const uv=new Float32Array(n*2)
      for(let i=0;i<n;i++){
        const x=pos.getX(i)-c.x,y=pos.getY(i)-c.y,z=pos.getZ(i)-c.z
        const l=Math.sqrt(x*x+y*y+z*z)||1
        uv[i*2]  =0.5+Math.atan2(z/l,x/l)/(2*Math.PI)
        uv[i*2+1]=0.5-Math.asin(Math.max(-1,Math.min(1,y/l)))/Math.PI
      }
      geo.setAttribute('uv',new THREE.BufferAttribute(uv,2))
      S.uvs=true; refreshUVInfo(); drawWire(); drawChecker()
      setStatus('UVs generated','ok'); setView('uv')
    }catch(e){ setStatus('Unwrap failed: '+e.message,'err') }
    $('btn-unwrap').disabled=false
  },30)
}

// ─── UV EDITOR ────────────────────────────────────────────────────────
let uvZ=1, uvPan={x:0,y:0}, uvPainting=false, uvPanning=false, uvLast=null, uvPS=null

function drawChecker(){
  for(const id of ['cc','cc-s']){
    const cv=$(id); if(!cv) continue
    const ctx=cv.getContext('2d')
    for(let r=0;r<UV/32;r++) for(let c=0;c<UV/32;c++){
      ctx.fillStyle=(r+c)%2===0?'#1a1a1a':'#141414'
      ctx.fillRect(c*32,r*32,32,32)
    }
  }
}

function drawWire(){
  for(const id of ['wc','wc-s']){
    const cv=$(id); if(!cv) continue
    const ctx=cv.getContext('2d'); ctx.clearRect(0,0,UV,UV)
    if(!S.mesh||!S.mesh.attributes.uv) continue
    const uv=S.mesh.attributes.uv,idx=S.mesh.index
    ctx.strokeStyle='rgba(0,229,255,.65)'; ctx.lineWidth=0.7
    ctx.beginPath()
    const tri=(a,b,c)=>{
      ctx.moveTo(uv.getX(a)*UV,(1-uv.getY(a))*UV)
      ctx.lineTo(uv.getX(b)*UV,(1-uv.getY(b))*UV)
      ctx.lineTo(uv.getX(c)*UV,(1-uv.getY(c))*UV)
      ctx.closePath()
    }
    if(idx){for(let i=0;i<idx.count;i+=3)tri(idx.getX(i),idx.getX(i+1),idx.getX(i+2))}
    else{for(let i=0;i<uv.count;i+=3)tri(i,i+1,i+2)}
    ctx.stroke()
  }
  $('no-uv').style.display='none'
  $('split-no-uv').style.display='none'
}

function uvXform(){
  for(const[sid,aid,zid]of[['uvstage','uvarea','uvzoom'],['split-uvstage','split-uvarea','uvzoom-s']]){
    const st=$(sid),ar=$(aid),zl=$(zid); if(!st||!ar) continue
    const w=ar.clientWidth,h=ar.clientHeight
    st.style.transform=`translate(${w/2-UV*uvZ/2+uvPan.x}px,${h/2-UV*uvZ/2+uvPan.y}px) scale(${uvZ})`
    if(zl) zl.textContent='ZOOM '+Math.round(uvZ*100)+'%'
  }
}

function uvGetPos(e, stageId){
  const st=$(stageId); if(!st) return{x:0,y:0}
  const r=st.getBoundingClientRect()
  return{x:(e.clientX-r.left)*(UV/r.width),y:(e.clientY-r.top)*(UV/r.height)}
}

function uvDoPaint(e, isSplit){
  const pcId=isSplit?'pc-s':'pc', mId=isSplit?'pc':'pc-s', stId=isSplit?'split-uvstage':'uvstage'
  const cv=$(pcId); if(!cv) return
  const ctx=cv.getContext('2d'), pos=uvGetPos(e,stId)
  ctx.globalCompositeOperation=S.mode==='erase'?'destination-out':'source-over'
  ctx.strokeStyle=S.color; ctx.lineWidth=S.brush; ctx.lineCap='round'; ctx.lineJoin='round'
  if(uvLast){ctx.beginPath();ctx.moveTo(uvLast.x,uvLast.y);ctx.lineTo(pos.x,pos.y);ctx.stroke()}
  else{ctx.beginPath();ctx.arc(pos.x,pos.y,S.brush/2,0,Math.PI*2);ctx.fillStyle=S.mode==='erase'?'rgba(0,0,0,1)':S.color;ctx.fill()}
  uvLast=pos
  const m=$(mId); if(m){const mc=m.getContext('2d');mc.clearRect(0,0,UV,UV);mc.drawImage(cv,0,0)}
  applyTex(cv)
}

function setupUVArea(areaId, stageId, isSplit){
  const ar=$(areaId); if(!ar) return
  ar.addEventListener('mousedown',e=>{
    if(e.button===1||e.altKey){uvPanning=true;uvPS={x:e.clientX-uvPan.x,y:e.clientY-uvPan.y};return}
    uvPainting=true;uvLast=null;uvDoPaint(e,isSplit)
  })
  ar.addEventListener('mousemove',e=>{
    if(uvPanning&&uvPS){uvPan={x:e.clientX-uvPS.x,y:e.clientY-uvPS.y};uvXform();return}
    if(uvPainting)uvDoPaint(e,isSplit)
  })
  ar.addEventListener('mouseup',()=>{uvPainting=false;uvPanning=false;uvLast=null})
  ar.addEventListener('mouseleave',()=>{uvPainting=false;uvPanning=false;uvLast=null})
  ar.addEventListener('wheel',e=>{e.preventDefault();uvZ=Math.max(.2,Math.min(10,uvZ-e.deltaY*.001));uvXform()},{passive:false})
}

function applyTex(cv){
  if(!mat) return
  const t=new THREE.CanvasTexture(cv); t.flipY=false
  mat.map=t; mat.color.set(0xffffff); mat.needsUpdate=true
}

function uvFill(){
  for(const id of['pc','pc-s']){
    const cv=$(id); if(!cv) continue
    const ctx=cv.getContext('2d'); ctx.globalCompositeOperation='source-over'
    ctx.fillStyle=S.color; ctx.fillRect(0,0,UV,UV)
  }
  applyTex($('pc'))
}
function uvClear(){
  for(const id of['pc','pc-s']){const cv=$(id);if(cv)cv.getContext('2d').clearRect(0,0,UV,UV)}
  if(mat){mat.map=null;mat.color.set(0xcccccc);mat.needsUpdate=true}
}
function uvExport(){
  const cv=$('pc'); if(!cv) return
  const a=document.createElement('a')
  a.download=(S.name?.replace(/\.[^.]+$/,'')||'texture')+'_uv.png'
  a.href=cv.toDataURL('image/png'); a.click()
}

// ─── VIEW SWITCHING ───────────────────────────────────────────────────
function setView(v){
  S.view=v
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'))
  $('v3d').classList.toggle('on',v==='3d')
  $('vuv').classList.toggle('on',v==='uv')
  $('vsplit').classList.toggle('on',v==='split')
  $('bv3').classList.toggle('a',v==='3d')
  $('bvuv').classList.toggle('a',v==='uv')
  $('bvsp').classList.toggle('a',v==='split')
  if(v==='split') getSplitRenderer()
  setTimeout(uvXform,10)
}

// ─── INSPECTOR ────────────────────────────────────────────────────────
const PAL=['#ffffff','#000000','#ff3b3b','#ff8c00','#ffb800','#39ff6e','#00e5ff','#0066ff','#9b59b6','#ff69b4','#8B4513','#888888']
function buildPalette(){
  const el=$('pal')
  PAL.forEach(c=>{
    const b=document.createElement('button'); b.className='sw'+(c===S.color?' on':'')
    b.style.background=c; b.title=c; b.onclick=()=>setColor(c); el.appendChild(b)
  })
}
function setColor(c){
  S.color=c; $('cpick').value=c; $('chex').textContent=c.toUpperCase()
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.title===c))
}
function setMode(m){
  S.mode=m
  $('m-paint').classList.toggle('on',m==='paint')
  $('m-erase').classList.toggle('on',m==='erase')
}
function refreshUVInfo(){
  $('i-uvs').textContent=S.uvs?'YES':'NONE'
  $('i-uvs').className='ival'+(S.uvs?' ok':'')
  $('fdot').style.background=S.uvs?'var(--ok)':'var(--txt3)'
  $('fdot').style.boxShadow=S.uvs?'0 0 6px var(--ok)':'none'
  $('ftxt').textContent=S.uvs?'READY':'NO UVS'
}

// ─── STATUS ───────────────────────────────────────────────────────────
function setStatus(msg,type=''){
  $('stxt').textContent=msg
  const col={ok:'var(--ok)',load:'var(--warn)',err:'var(--err)'}[type]||'var(--txt3)'
  $('sdot').style.background=col; $('stxt').style.color=col
  $('sdot').style.boxShadow=type==='ok'?'0 0 6px var(--ok)':'none'
  const sb=$('statusbar'); sb.querySelector('.spin')?.remove()
  if(type==='load'){const sp=document.createElement('div');sp.className='spin';sb.insertBefore(sp,$('sdot'))}
}

// ─── RESET ────────────────────────────────────────────────────────────
function resetAll(){
  if(meshObj){scene.remove(meshObj);meshObj.geometry.dispose();meshObj.material.dispose();meshObj=null;mat=null}
  S.mesh=null;S.name=null;S.uvs=false
  for(const id of['pc','pc-s','wc','wc-s']){const cv=$(id);if(cv)cv.getContext('2d').clearRect(0,0,UV,UV)}
  $('no-mesh').style.display=''; $('drop-hint').style.display=''
  $('btn-unwrap').disabled=true; $('btn-reset').style.display='none'
  $('i-file').textContent='—'; $('i-verts').textContent='—'; $('i-tris').textContent='—'
  $('no-uv').style.display=''; $('split-no-uv').style.display=''
  refreshUVInfo(); setStatus('Drop a mesh to begin'); OC.reset(); setView('3d')
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────
document.addEventListener('dragenter',()=>$('drop-ov').classList.add('on'))
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)$('drop-ov').classList.remove('on')})
document.addEventListener('dragover',e=>e.preventDefault())
document.addEventListener('drop',async e=>{
  e.preventDefault(); $('drop-ov').classList.remove('on')
  const f=e.dataTransfer.files?.[0]; if(f) await loadFile(f)
})

// ─── INIT ─────────────────────────────────────────────────────────────
;['cc','cc-s','pc','pc-s','wc','wc-s'].forEach(id=>{const cv=$(id);if(cv){cv.width=UV;cv.height=UV}})
drawChecker()
buildPalette()
setupUVArea('uvarea','uvstage',false)
setupUVArea('split-uvarea','split-uvstage',true)
uvXform()
setStatus('Drop a mesh to begin')
</script>
